<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorem Ipsum Generator — AntiNature</title>
  <meta name="description" content="Generate placeholder Lorem Ipsum text — paragraphs, sentences, or words. Free, instant, no login.">
  <link rel="stylesheet" href="../../css/style.css">
  <script src="../../js/theme.js"></script>
</head>
<body>
  <nav class="navbar"></nav>
  <script src="../../js/navbar.js"></script>

  <main class="page"><div class="container" style="max-width:800px;">
    <header class="page-header animate-in">
      <div class="page-header__breadcrumb"><a href="../../index.html">Home</a><span class="page-header__breadcrumb-sep">›</span><a href="#">Text Tools</a><span class="page-header__breadcrumb-sep">›</span><span>Lorem Ipsum</span></div>
      <h1 class="page-header__title">Lorem Ipsum Generator</h1>
      <p class="page-header__subtitle">Generate placeholder text for your designs and layouts.</p>
    </header>

    <div class="glass glass--static input-panel animate-in">
      <div style="display:flex;gap:var(--space-md);flex-wrap:wrap;align-items:flex-end;margin-bottom:var(--space-md);">
        <div><label style="font-size:0.82rem;color:var(--text-secondary);display:block;margin-bottom:4px;">Amount</label><input type="number" id="amount" value="3" min="1" max="50" style="padding:8px 12px;border:1px solid var(--border-light);border-radius:var(--radius-sm);background:var(--glass-bg);color:var(--text-primary);font-family:var(--font-family);width:80px;"></div>
        <div><label style="font-size:0.82rem;color:var(--text-secondary);display:block;margin-bottom:4px;">Type</label><select id="type" style="padding:8px 12px;border:1px solid var(--border-light);border-radius:var(--radius-sm);background:var(--glass-bg);color:var(--text-primary);font-family:var(--font-family);"><option value="paragraphs">Paragraphs</option><option value="sentences">Sentences</option><option value="words">Words</option></select></div>
        <div><label style="font-size:0.82rem;color:var(--text-secondary);display:block;margin-bottom:4px;">&nbsp;</label><label style="font-size:0.85rem;color:var(--text-primary);cursor:pointer;"><input type="checkbox" id="start-lorem" checked style="accent-color:var(--accent);margin-right:4px;">Start with "Lorem ipsum…"</label></div>
        <button class="btn btn--accent" id="btn-gen">Generate</button>
      </div>
      <div id="output" style="padding:var(--space-md);background:var(--accent-soft);border:1px solid var(--border-light);border-radius:var(--radius-md);color:var(--text-primary);font-size:0.92rem;line-height:1.8;white-space:pre-wrap;min-height:100px;"></div>
      <div style="margin-top:var(--space-md);display:flex;gap:var(--space-sm);"><button class="btn" id="btn-copy">⧉ Copy</button></div>
    </div>
  </div></main>

  <footer class="footer"><div class="container"><p>© 2026 <a href="../../index.html">AntiNature</a> — Free online tools. No login. No tracking. No nonsense.</p></div></footer>

  <script>
  (function(){
    var WORDS='lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo consequat duis aute irure in reprehenderit voluptate velit esse cillum fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt culpa qui officia deserunt mollit anim id est laborum'.split(' ');
    var OPENER='Lorem ipsum dolor sit amet, consectetur adipiscing elit.';

    function getRand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
    function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

    function genSentence(){
      var len=6+Math.floor(Math.random()*12);
      var s=[];
      for(var i=0;i<len;i++) s.push(getRand(WORDS));
      return cap(s.join(' '))+'.';
    }

    function genParagraph(){
      var len=3+Math.floor(Math.random()*5);
      var p=[];
      for(var i=0;i<len;i++) p.push(genSentence());
      return p.join(' ');
    }

    function generate(){
      var amount=parseInt(document.getElementById('amount').value)||3;
      var type=document.getElementById('type').value;
      var startLorem=document.getElementById('start-lorem').checked;
      var result=[];

      if(type==='paragraphs'){
        for(var i=0;i<amount;i++) result.push(genParagraph());
        if(startLorem && result.length) result[0]=OPENER+' '+result[0];
      } else if(type==='sentences'){
        for(var i=0;i<amount;i++) result.push(genSentence());
        if(startLorem && result.length) result[0]=OPENER;
      } else {
        var w=[];
        for(var i=0;i<amount;i++) w.push(getRand(WORDS));
        if(startLorem) w[0]='Lorem';
        result.push(w.join(' '));
      }

      document.getElementById('output').textContent=result.join('\n\n');
    }

    document.getElementById('btn-gen').addEventListener('click',generate);
    document.getElementById('btn-copy').addEventListener('click',function(){
      var t=document.getElementById('output').textContent;
      if(t){navigator.clipboard.writeText(t);this.textContent='✓ Copied';var b=this;setTimeout(function(){b.textContent='⧉ Copy';},1500);}
    });
    generate();
  })();
  </script>
</body>
</html>
