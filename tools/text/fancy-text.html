    /* 3. Card Elements */

    .pyramid-stage { height: 250px; margin-top: var(--space-xl); width: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.3; pointer-events: none; }
    
    .fancy-grid { display: grid; grid-template-columns: 1fr; gap: var(--space-sm); margin-top: var(--space-md); }
    .fancy-row { display: flex; align-items: center; justify-content: space-between; padding: var(--space-md); border-radius: var(--radius-md); background: var(--glass-bg); backdrop-filter: blur(8px); border: 1px solid var(--glass-border); transition: all var(--transition-fast); }
    .fancy-row:hover { background: var(--glass-bg-hover); }
    .fancy-row__text { font-size: 1.05rem; color: var(--text-primary); word-break: break-all; flex: 1; margin-right: var(--space-md); }
    .fancy-row__label { font-size: 0.7rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600; }
    .fancy-row__copy { padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-light); background: transparent; color: var(--text-secondary); font-size: 0.75rem; cursor: pointer; font-family: var(--font-family); transition: all var(--transition-fast); white-space: nowrap; }

    var AZ = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    var az = 'abcdefghijklmnopqrstuvwxyz';
    var numbers = '0123456789';
    var grid = document.getElementById('output-grid');
    var input = document.getElementById('text-input');

    function charMap(text, fontObj) {
      if (typeof fontObj === 'function') return fontObj(text);
      var uc = Array.from(fontObj.upper || '');
      var lc = Array.from(fontObj.lower || '');
      var nc = fontObj.nums ? Array.from(fontObj.nums) : [];
      return Array.from(text).map(function(ch){
        var ui = AZ.indexOf(ch); if(ui>=0 && ui<uc.length) return uc[ui];
        var li = az.indexOf(ch); if(li>=0 && li<lc.length) return lc[li];
        var ni = numbers.indexOf(ch); if(ni>=0 && ni<nc.length) return nc[ni];
        return ch;
      }).join('');
    }

    function render() {
      var text = input.value || 'AntiNature';
      grid.innerHTML = '';
      Object.keys(fonts).forEach(function(name){
        var converted = charMap(text, fonts[name]);
        var row = document.createElement('div');
        row.className = 'fancy-row';
        row.innerHTML = '<div><div class="fancy-row__label">'+name+'</div><div class="fancy-row__text">'+converted+'</div></div><button class="fancy-row__copy">Copy</button>';
        row.querySelector('.fancy-row__copy').addEventListener('click', function(){
          navigator.clipboard.writeText(converted);
          this.textContent = 'вЬУ';
          var b = this;
          setTimeout(function(){ b.textContent='Copy'; }, 1200);
        });
        grid.appendChild(row);
      });
    }

    // Utility Buttons
    var btnPaste = document.getElementById('btn-paste');
    var btnCopy = document.getElementById('btn-copy');
    var btnClear = document.getElementById('btn-clear');

    // Programs modifying .value destroy the browser's undo stack. This preserves it.
    function updateWithUndo(el, text) {
      el.focus();
      el.select();
      if (text === '') { document.execCommand('delete'); } 
      else { if (!document.execCommand('insertText', false, text)) { el.value = text; } }
    }

    if(btnPaste) btnPaste.addEventListener('click', async () => {
      try { const text = await navigator.clipboard.readText(); updateWithUndo(input, text); } catch(e) {}
    });
    if(btnCopy) btnCopy.addEventListener('click', () => {
      navigator.clipboard.writeText(input.value);
      var original = btnCopy.textContent; btnCopy.textContent = 'вЬУ Copied';
      setTimeout(() => btnCopy.textContent = original, 1200);
    });
    if(btnClear) btnClear.addEventListener('click', () => { updateWithUndo(input, ''); });

    var btnGen = document.getElementById('btn-generate');
    btnGen.addEventListener('click', function() {
      if (!input.value.trim()) { alert('Please enter some text to generate.'); return; }
      var originalText = btnGen.textContent;
      render();
      btnGen.textContent = 'вЬУ Generated';
      setTimeout(function() { btnGen.textContent = originalText; }, 1500);
    });
    
    // Initial render
    render();
  })();

  // 3D Card Engine Script
  const container = document.getElementById('bg-container');
  const footerEl = document.getElementById('main-footer');
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
  const cardSize = 30; 
  let cols; let pilePxHeights = []; let fallingLeaves = []; let staticCardsData = []; let floorY = 0;

  function createCardElement(char, isStatic = false) {
    const card = document.createElement('div'); card.className = `letter-card ${isStatic ? 'static-card' : ''}`;
    const front = document.createElement('div'); front.className = 'letter-face'; front.textContent = char;
    const back = document.createElement('div'); back.className = 'letter-face letter-face--back'; back.textContent = char;
    card.appendChild(front); card.appendChild(back); return card;
  }

  function init3DEngine() {
    container.innerHTML = ''; staticCardsData = [];
    const width = document.documentElement.clientWidth; 
    cols = Math.floor(width / cardSize); 
    floorY = footerEl.offsetTop - 10; 
    let centerCol = Math.floor(cols / 2); let maxPilePx = 150; pilePxHeights = new Array(cols).fill(0);

    for (let c = 0; c < cols; c++) {
      let dist = Math.abs(c - centerCol); let heightForCol = maxPilePx - (dist * 12); 
      if (heightForCol < 20 && Math.random() > 0.4) heightForCol = 0; 
      if (heightForCol < 0) heightForCol = 0;
      pilePxHeights[c] = heightForCol;
      let numCardsInPile = Math.floor(heightForCol / 5);

      for (let i = 0; i < numCardsInPile; i++) {
        let char = letters[Math.floor(Math.random() * letters.length)];
        let card = createCardElement(char, true);
        let x = (c * cardSize) + (Math.random() - 0.5) * 40; let yOffset = (i * 5) - (Math.random() - 0.5) * 10; let z = (Math.random() - 0.5) * 80; 
        let rx = (60 + Math.random() * 25) * (Math.random() > 0.5 ? 1 : -1); let ry = Math.random() * 360; let rz = Math.random() * 360; 
        staticCardsData.push({ el: card, x, yOffset, z, rx, ry, rz });
        card.style.transform = `translate3d(${x}px, ${floorY - yOffset}px, ${z}px) rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg)`;
        container.appendChild(card);
      }
    }
    fallingLeaves = []; for (let i = 0; i < 15; i++) fallingLeaves.push(new FallingCard(true));
  }

  class FallingCard {
    constructor(initialLoad = false) { this.el = createCardElement('A', false); container.appendChild(this.el); this.reset(initialLoad); }
    reset(initialLoad = false) {
      this.baseX = Math.random() * document.documentElement.clientWidth;
      let spawnY = -100; // Fixed relative to viewport top
      this.y = initialLoad ? (Math.random() * window.innerHeight) : spawnY;
      this.x = this.baseX;
      let newChar = letters[Math.floor(Math.random() * letters.length)];
      this.el.children[0].textContent = newChar; this.el.children[1].textContent = newChar;
      this.speedY = Math.random() * 0.8 + 0.4; 
      this.swingAngle = Math.random() * Math.PI * 2; this.swingSpeed = Math.random() * 0.02 + 0.01; this.swingRadius = Math.random() * 40 + 20;
      this.rotX = Math.random() * 360; this.rotY = Math.random() * 360; this.rotZ = Math.random() * 360;
      this.spinX = (Math.random() - 0.5) * 3; this.spinY = (Math.random() - 0.5) * 3; this.spinZ = (Math.random() - 0.5) * 1;
    }
    update() {
      this.y += this.speedY; this.swingAngle += this.swingSpeed; this.x = this.baseX + Math.sin(this.swingAngle) * this.swingRadius;
      this.rotX += this.spinX; this.rotY += this.spinY; this.rotZ += this.spinZ;
      let currentCol = Math.floor(this.baseX / cardSize);
      if (currentCol < 0) currentCol = 0; if (currentCol >= cols) currentCol = cols - 1;
      let targetY = floorY - pilePxHeights[currentCol];
      this.el.style.transform = `translate3d(${this.x}px, ${this.y}px, 0) rotateX(${this.rotX}deg) rotateY(${this.rotY}deg) rotateZ(${this.rotZ}deg)`;
      if (this.y > targetY) this.reset(false);
    }
  }

  let lastWidth = document.documentElement.clientWidth;
  const resizeObserver = new ResizeObserver(() => {
    const newWidth = document.documentElement.clientWidth;
    if (Math.abs(newWidth - lastWidth) > 20) {
      lastWidth = newWidth; clearTimeout(window.resizeTimer); window.resizeTimer = setTimeout(init3DEngine, 300);
    }
  });
  resizeObserver.observe(document.body);

  function animateEngine() {
    // Dynamically calculate the floor line relative precisely to the fixed viewport lens
    let currentFloorY = footerEl.getBoundingClientRect().top - 10;
    
    if (Math.abs(currentFloorY - floorY) > 0.5) {
      floorY = currentFloorY;
      staticCardsData.forEach(c => { 
        // 3D perspective clipping completely vanishes because the lens is fixed to 100vh
        c.el.style.transform = `translate3d(${c.x}px, ${floorY - c.yOffset}px, ${c.z}px) rotateX(${c.rx}deg) rotateY(${c.ry}deg) rotateZ(${c.rz}deg)`; 
      });
    }
    fallingLeaves.forEach(leaf => leaf.update()); 
    requestAnimationFrame(animateEngine);
  }
  setTimeout(() => { init3DEngine(); animateEngine(); }, 50);
  </script>
</body>
