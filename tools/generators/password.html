<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator — AntiNature</title>
  <meta name="description" content="Generate strong, secure, customizable passwords instantly. Choose length, include uppercase, numbers, symbols. Free, no login.">
  <link rel="stylesheet" href="../../css/style.css">
  <script src="../../js/theme.js"></script>
  <style>
    .password-display { font-family: var(--font-mono); font-size: 1.3rem; letter-spacing: 0.05em; padding: var(--space-lg); text-align: center; word-break: break-all; color: var(--text-primary); min-height: 60px; display: flex; align-items: center; justify-content: center; }
    .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); }
    .control-group { display: flex; flex-direction: column; gap: var(--space-xs); }
    .control-group label { font-size: 0.82rem; color: var(--text-secondary); font-weight: 500; }
    .range-row { display: flex; align-items: center; gap: var(--space-md); }
    .range-row input[type="range"] { flex: 1; accent-color: var(--accent); }
    .range-val { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); min-width: 30px; text-align: center; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: var(--space-sm) 0; }
    .toggle-row label { font-size: 0.88rem; color: var(--text-primary); cursor: pointer; }
    input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
    .strength-bar { height: 6px; border-radius: 3px; background: var(--border-light); overflow: hidden; margin-top: var(--space-sm); }
    .strength-fill { height: 100%; border-radius: 3px; transition: width var(--transition-base), background var(--transition-base); }
    .strength-label { font-size: 0.75rem; margin-top: 4px; font-weight: 600; }
    .action-row { display: flex; gap: var(--space-sm); margin-top: var(--space-md); justify-content: center; flex-wrap: wrap; }
    @media(max-width:768px){ .controls-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="navbar"></nav>
  <script src="../../js/navbar.js"></script>

  <main class="page"><div class="container" style="max-width:700px;">
    <header class="page-header animate-in">
      <div class="page-header__breadcrumb"><a href="../../index.html">Home</a><span class="page-header__breadcrumb-sep">›</span><a href="#">Generators</a><span class="page-header__breadcrumb-sep">›</span><span>Password</span></div>
      <h1 class="page-header__title">Password Generator</h1>
      <p class="page-header__subtitle">Generate strong, secure passwords with customizable options.</p>
    </header>

    <div class="glass password-display animate-in" id="password-output">Click Generate</div>

    <div style="margin: var(--space-sm) 0 var(--space-md);">
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>

    <div class="action-row animate-in">
      <button class="btn btn--accent" id="btn-generate" style="padding:10px 28px;font-size:0.9rem;">⟳ Generate</button>
      <button class="btn" id="btn-copy">⧉ Copy</button>
    </div>

    <div class="glass glass--static input-panel animate-in" style="margin-top:var(--space-xl);">
      <div class="input-panel__header"><span class="input-panel__title">Options</span></div>
      <div class="control-group" style="margin-bottom:var(--space-md);">
        <label>Password Length</label>
        <div class="range-row">
          <input type="range" id="length" min="4" max="64" value="16">
          <span class="range-val" id="length-val">16</span>
        </div>
      </div>
      <div class="toggle-row"><label for="opt-upper">Uppercase (A-Z)</label><input type="checkbox" id="opt-upper" checked></div>
      <div class="toggle-row"><label for="opt-lower">Lowercase (a-z)</label><input type="checkbox" id="opt-lower" checked></div>
      <div class="toggle-row"><label for="opt-numbers">Numbers (0-9)</label><input type="checkbox" id="opt-numbers" checked></div>
      <div class="toggle-row"><label for="opt-symbols">Symbols (!@#$...)</label><input type="checkbox" id="opt-symbols" checked></div>
      <div class="toggle-row"><label for="opt-ambiguous">Exclude Ambiguous (0OIl1)</label><input type="checkbox" id="opt-ambiguous"></div>
    </div>
  </div></main>

  <footer class="footer"><div class="container"><p>© 2026 <a href="../../index.html">AntiNature</a> — Free online tools. No login. No tracking. No nonsense.</p></div></footer>

  <script>
  (function(){
    var out = document.getElementById('password-output');
    var fill = document.getElementById('strength-fill');
    var slabel = document.getElementById('strength-label');
    var lenSlider = document.getElementById('length');
    var lenVal = document.getElementById('length-val');

    lenSlider.addEventListener('input', function(){ lenVal.textContent = this.value; });

    function generate() {
      var len = parseInt(lenSlider.value);
      var chars = '';
      if(document.getElementById('opt-upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if(document.getElementById('opt-lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
      if(document.getElementById('opt-numbers').checked) chars += '0123456789';
      if(document.getElementById('opt-symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
      if(document.getElementById('opt-ambiguous').checked) chars = chars.replace(/[0OIl1]/g, '');
      if(!chars) { out.textContent = 'Select at least one option'; return; }
      var arr = new Uint32Array(len);
      crypto.getRandomValues(arr);
      var pw = Array.from(arr).map(function(n){ return chars[n % chars.length]; }).join('');
      out.textContent = pw;
      showStrength(pw);
    }

    function showStrength(pw) {
      var score = 0;
      if(pw.length >= 8) score++;
      if(pw.length >= 12) score++;
      if(pw.length >= 20) score++;
      if(/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if(/[0-9]/.test(pw)) score++;
      if(/[^A-Za-z0-9]/.test(pw)) score++;
      var pct = Math.min(100, (score / 6) * 100);
      var color = pct < 40 ? '#c0392b' : pct < 70 ? '#b8860b' : '#3a8a6a';
      var label = pct < 40 ? 'Weak' : pct < 70 ? 'Moderate' : pct < 90 ? 'Strong' : 'Very Strong';
      fill.style.width = pct + '%';
      fill.style.background = color;
      slabel.textContent = label;
      slabel.style.color = color;
    }

    document.getElementById('btn-generate').addEventListener('click', generate);
    document.getElementById('btn-copy').addEventListener('click', function(){
      var t = out.textContent;
      if(t && t !== 'Click Generate' && t !== 'Select at least one option'){
        navigator.clipboard.writeText(t);
        this.textContent = '✓ Copied';
        var b = this;
        setTimeout(function(){ b.textContent = '⧉ Copy'; }, 1500);
      }
    });
    generate();
  })();
  </script>
</body>
</html>
