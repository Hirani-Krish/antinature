<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Effect 13: Prism Optics</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme.js"></script>
</head>
<body>
  
  <canvas id="bg-canvas" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; opacity: 0.8;"></canvas>

  <nav class="navbar"></nav>
  <script src="js/navbar.js"></script>

  <main class="page">
    <div class="container" style="text-align: center; margin-top: 15vh;">
      <h1 style="font-size: 3rem; font-weight: 800; letter-spacing: -0.04em; text-shadow: 0 4px 20px rgba(0,0,0,0.05);">Prism Optics</h1>
      <p style="color: var(--text-secondary); max-width: 500px; margin: var(--space-md) auto;">
        Effect 13: Colossal, translucent geometric panes pass over one another in ultra-slow motion, blending light dynamically.
      </p>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let prisms = [];

    // Very subtle mouse parallax
    let mouseX = 0, mouseY = 0;
    let targetX = 0, targetY = 0;
    
    window.addEventListener('mousemove', e => { 
      targetX = (e.clientX - window.innerWidth/2) * 0.05; 
      targetY = (e.clientY - window.innerHeight/2) * 0.05; 
    });

    function init() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      
      prisms = [];
      const count = window.innerWidth < 768 ? 4 : 8;
      
      for(let i=0; i<count; i++) {
        prisms.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 400 + 400, // Massive sizes
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.002,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          sides: Math.random() > 0.5 ? 3 : 4 // Triangles or squares
        });
      }
    }
    
    window.addEventListener('resize', init);
    init();

    function drawPolygon(ctx, x, y, radius, sides, rot) {
      ctx.beginPath();
      for (let i = 0; i < sides; i++) {
        const a = rot + (i * Math.PI * 2) / sides;
        if (i === 0) ctx.moveTo(x + Math.cos(a) * radius, y + Math.sin(a) * radius);
        else ctx.lineTo(x + Math.cos(a) * radius, y + Math.sin(a) * radius);
      }
      ctx.closePath();
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      
      // Interpolate mouse movement for super smooth parallax
      mouseX += (targetX - mouseX) * 0.05;
      mouseY += (targetY - mouseY) * 0.05;

      // Use blend modes to create the "optical overlap" effect
      ctx.globalCompositeOperation = isDark ? "screen" : "multiply";

      // Monochromatic elegant shades
      let fillCol = isDark ? 'rgba(138, 180, 248, 0.08)' : 'rgba(74, 111, 165, 0.05)';
      let borderCol = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.04)';

      prisms.forEach((p, idx) => {
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.rotSpeed;

        // Wrap around gently
        if(p.x < -p.size) p.x = width + p.size;
        if(p.x > width + p.size) p.x = -p.size;
        if(p.y < -p.size) p.y = height + p.size;
        if(p.y > height + p.size) p.y = -p.size;

        // Apply mouse parallax (different elements parallax differently to create depth)
        let px = p.x + (mouseX * (idx % 3 + 1));
        let py = p.y + (mouseY * (idx % 3 + 1));

        ctx.fillStyle = fillCol;
        ctx.strokeStyle = borderCol;
        ctx.lineWidth = 1;

        drawPolygon(ctx, px, py, p.size, p.sides, p.rot);
        ctx.fill();
        ctx.stroke();
      });

      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
