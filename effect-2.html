<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Effect 2: 3D Glass Geometry</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme.js"></script>
</head>
<body>
  <!-- The Experimental Canvas -->
  <canvas id="bg-canvas" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;"></canvas>

  <nav class="navbar"></nav>
  <script src="js/navbar.js"></script>

  <main class="page">
    <div class="container" style="text-align: center; margin-top: 20vh;">
      <h1 style="font-size: 3rem; font-weight: 800; letter-spacing: -0.04em; text-shadow: 0 4px 20px rgba(0,0,0,0.1);">3D Glass Geometry</h1>
      <p style="color: var(--text-secondary); max-width: 500px; margin: var(--space-md) auto;">
        Effect 2: Floating geometric shapes with Z-depth parsing, blur filtering, and extreme parallax based on mouse mapping.
      </p>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let shapes = [];

    let mouseX = window.innerWidth / 2; 
    let mouseY = window.innerHeight / 2;
    window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

    function init() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      
      shapes = [];
      const count = window.innerWidth < 768 ? 20 : 45;
      
      for(let i=0; i<count; i++) {
        shapes.push({
          x: Math.random() * width,
          y: Math.random() * height,
          z: Math.random() * 100, // Z-depth (0 is close, 100 is far)
          type: Math.random() > 0.5 ? 'square' : 'triangle',
          size: Math.random() * 40 + 20,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.02,
          driftX: (Math.random() - 0.5) * 0.5,
          driftY: (Math.random() - 0.5) * 0.5
        });
      }
      
      // Sort by Z to render furthest to closest
      shapes.sort((a,b) => b.z - a.z);
    }
    
    window.addEventListener('resize', init);
    init();

    function animate() {
      ctx.clearRect(0, 0, width, height);
      let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      
      shapes.forEach(s => {
        s.x += s.driftX; s.y += s.driftY; s.rot += s.rotSpeed;
        if(s.x < -100) s.x = width + 100; if(s.x > width + 100) s.x = -100;
        if(s.y < -100) s.y = height + 100; if(s.y > height + 100) s.y = -100;

        // Parallax offset based on mouse & depth
        let parallaxX = ((mouseX - width/2) * (100 - s.z)) * -0.0008;
        let parallaxY = ((mouseY - height/2) * (100 - s.z)) * -0.0008;

        let drawX = s.x + parallaxX;
        let drawY = s.y + parallaxY;
        
        let scale = 1 - (s.z / 150); // Scale down based on depth

        ctx.save();
        ctx.translate(drawX, drawY);
        ctx.rotate(s.rot);
        ctx.scale(scale, scale);
        
        // Depth-based blur & opacity
        let blurAmount = s.z > 50 ? (s.z - 50) * 0.08 : 0;
        ctx.filter = `blur(${blurAmount}px)`;
        ctx.globalAlpha = 1 - (s.z / 120);

        ctx.lineWidth = 2;
        ctx.strokeStyle = isDark ? `rgba(255, 255, 255, 0.4)` : `rgba(0, 0, 0, 0.25)`;
        
        // Glass fill
        ctx.fillStyle = isDark ? `rgba(255, 255, 255, 0.03)` : `rgba(0, 0, 0, 0.02)`;

        ctx.beginPath();
        if (s.type === 'square') {
          ctx.rect(-s.size/2, -s.size/2, s.size, s.size);
        } else {
          ctx.moveTo(0, -s.size/2);
          ctx.lineTo(s.size/2, s.size/2);
          ctx.lineTo(-s.size/2, s.size/2);
          ctx.closePath();
        }
        
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      });

      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
